<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>TaskFlow Pro — Премиальный образовательный таск-менеджер</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* ==========================================================================
           1. ДИЗАЙН-СИСТЕМА И ПЕРЕМЕННЫЕ (СВЕТЛАЯ И ТЕМНАЯ ТЕМА)
           ========================================================================== */
        :root {
            --primary: #FF7A00;
            --primary-light: #FFF0E0;
            --primary-hover: #E56E00;
            --primary-alpha: rgba(255, 122, 0, 0.08);
            --bg: #FAFAFA;
            --sidebar-bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --modal-bg: #FFFFFF;
            
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --text-ghost: #999999;
            --text-on-primary: #FFFFFF;
            
            --border: #EEEEEE;
            --border-hover: #D8D8D8;
            --border-focus: #FF7A00;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --radius-xs: 4px;

            --danger: #FF3B30;
            --danger-light: #FFEBEB;
            --success: #00B341;
            --success-light: #E6F9EE;
            --warning: #FFCC00;
            --info: #007AFF;
            
            --shadow-sm: 0px 1px 2px rgba(0, 0, 0, 0.02), 0px 4px 12px rgba(0, 0, 0, 0.03);
            --shadow-md: 0px 4px 12px rgba(0, 0, 0, 0.05), 0px 16px 40px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0px 12px 24px rgba(0, 0, 0, 0.08), 0px 32px 64px rgba(0, 0, 0, 0.08);
            
            --transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            --sidebar-width: 280px;
        }

        [data-theme="dark"] {
            --primary: #FF8A1F;
            --primary-light: #2C1A08;
            --primary-hover: #FF9F43;
            --primary-alpha: rgba(255, 138, 31, 0.15);
            --bg: #0B0B0C;
            --sidebar-bg: #121214;
            --card-bg: #161619;
            --modal-bg: #1A1A1E;
            
            --text-main: #F5F5F7;
            --text-muted: #A0A0A5;
            --text-ghost: #636366;
            
            --border: #222226;
            --border-hover: #323238;
            --border-focus: #FF8A1F;
            
            --shadow-sm: 0px 1px 2px rgba(0, 0, 0, 0.2), 0px 4px 12px rgba(0, 0, 0, 0.3);
            --shadow-md: 0px 4px 12px rgba(0, 0, 0, 0.4), 0px 16px 40px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0px 12px 24px rgba(0, 0, 0, 0.5), 0px 32px 64px rgba(0, 0, 0, 0.5);

            --danger: #FF453A;
            --danger-light: #2C1514;
            --success: #32D74B;
            --success-light: #122C17;
        }

        /* ==========================================================================
           2. БАЗОВЫЕ СТИЛИ И СБРОС СТАНДАРТНЫХ СВОЙСТВ
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            letter-spacing: -0.011em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-hover);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-ghost);
        }

        input, select, textarea, button {
            font-family: inherit;
            font-size: inherit;
            color: inherit;
        }

        /* ==========================================================================
           3. КОМПОНЕНТЫ И КНОПКИ (UI COMPONENTS)
           ========================================================================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            user-select: none;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--text-on-primary);
            box-shadow: 0px 2px 4px rgba(255, 122, 0, 0.15);
            font-weight: 600;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0px 4px 12px rgba(255, 122, 0, 0.25);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--card-bg);
            border-color: var(--border);
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary:hover {
            background: var(--bg);
            border-color: var(--border-hover);
        }

        .btn-danger {
            background: var(--danger);
            color: #FFFFFF;
            box-shadow: 0px 2px 4px rgba(255, 59, 48, 0.15);
        }

        .btn-danger:hover {
            background: #E03126;
            transform: translateY(-1px);
        }

        .icon-btn {
            width: 30px;
            height: 30px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background: var(--border);
            color: var(--text-main);
        }

        .icon-btn.danger-hover:hover {
            background: var(--danger-light);
            color: var(--danger);
        }

        /* 🌟 ОБНОВЛЕННЫЕ ПРЕМИУМ-СТИЛИ ДЛЯ СТИКЕРОВ И БЕЙДЖЕЙ ПРИОРИТЕТА */
        .badge-priority {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15), 0 2px 4px rgba(0, 0, 0, 0.03);
            position: relative;
            overflow: hidden;
            user-select: none;
            transition: var(--transition);
        }

        /* Анимация лазерного глянцевого отблеска при наведении на задачу */
        .task-row:hover .badge-priority::after {
            content: '';
            position: absolute;
            top: 0; 
            left: -100%; 
            width: 200%; 
            height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: badgeShineEffect 1.2s ease-in-out infinite;
        }

        @keyframes badgeShineEffect {
            0% { left: -150%; }
            100% { left: 150%; }
        }

        /* Высокий приоритет: глубокий рубиновый неоновый градиент */
        .priority-high { 
            background: linear-gradient(135deg, rgba(255, 59, 48, 0.12) 0%, rgba(255, 59, 48, 0.22) 100%); 
            color: var(--danger); 
            border: 1px solid rgba(255, 59, 48, 0.28);
            box-shadow: 0 0 8px rgba(255, 59, 48, 0.08);
        }

        /* Средний приоритет: благородный янтарный градиент */
        .priority-medium { 
            background: linear-gradient(135deg, rgba(255, 122, 0, 0.1) 0%, rgba(255, 122, 0, 0.2) 100%); 
            color: var(--primary); 
            border: 1px solid rgba(255, 122, 0, 0.26);
            box-shadow: 0 0 8px rgba(255, 122, 0, 0.08);
        }

        /* Низкий приоритет: глубокий сапфирово-синий градиент */
        .priority-low { 
            background: linear-gradient(135deg, rgba(0, 122, 255, 0.08) 0%, rgba(0, 122, 255, 0.18) 100%); 
            color: var(--info); 
            border: 1px solid rgba(0, 122, 255, 0.24);
            box-shadow: 0 0 8px rgba(0, 122, 255, 0.06);
        }

        /* ==========================================================================
           4. ЛЕЙАУТ И БОКОВАЯ ПАНЕЛЬ (SIDEBAR)
           ========================================================================== */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
            transition: var(--transition);
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background-color: var(--primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0px 4px 10px rgba(255, 122, 0, 0.25);
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.04em;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            padding: 0 12px;
            gap: 4px;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            cursor: pointer;
            user-select: none;
        }

        .nav-item-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item svg {
            color: var(--text-ghost);
            transition: var(--transition);
        }

        .nav-item:hover {
            background-color: var(--bg);
            color: var(--text-main);
        }

        .nav-item:hover svg {
            color: var(--text-muted);
        }

        .nav-item.active {
            background-color: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
        }

        .nav-item.active svg {
            color: var(--primary);
        }

        /* 🌟 ОБНОВЛЕННЫЕ ПРЕМИУМ-СТИЛИ ДЛЯ СТИКЕРОВ-СЧЕТЧИКОВ В МЕНЮ */
        .nav-badge {
            background: linear-gradient(135deg, var(--bg) 0%, var(--border) 100%);
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 20px;
            border: 1px solid var(--border-hover);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), var(--shadow-sm);
            transition: var(--transition);
        }

        /* Активное состояние счетчика в меню при выборе пункта */
        .nav-item.active .nav-badge {
            background: linear-gradient(135deg, #FF9F43 0%, var(--primary) 100%);
            color: var(--text-on-primary);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 10px rgba(255, 122, 0, 0.25), inset 0 1px 1px rgba(255,255,255,0.3);
            text-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        /* Стили адаптации счетчиков под темную тему */
        [data-theme="dark"] .nav-badge {
            background: linear-gradient(135deg, #1A1A1E 0%, #222226 100%);
            border-color: #323238;
            color: var(--text-muted);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.02), var(--shadow-sm);
        }
        [data-theme="dark"] .badge-priority {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.04), 0 4px 12px rgba(0, 0, 0, 0.15);
        }

        .nav-divider {
            height: 1px;
            background-color: var(--border);
            margin: 12px 12px;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.01);
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            border: 1px solid rgba(255, 122, 0, 0.15);
            text-transform: uppercase;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .user-role {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        /* ==========================================================================
           5. ГЛАВНАЯ ОБЛАСТЬ И ПАНЕЛЬ НАВИГАЦИИ (TOPBAR)
           ========================================================================== */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .topbar {
            height: 64px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            max-width: 540px;
        }

        .menu-toggle {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 4px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg);
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            width: 100%;
            transition: var(--transition);
            border: 1px solid var(--border);
        }

        .search-box:focus-within {
            background: var(--card-bg);
            border-color: var(--primary);
            box-shadow: 0px 0px 0px 3px var(--primary-alpha);
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: var(--text-main);
            width: 100%;
        }

        .search-hint {
            font-size: 11px;
            color: var(--text-ghost);
            background: var(--card-bg);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border);
            font-weight: 600;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .content-container {
            padding: 40px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            flex: 1;
        }

        /* ==========================================================================
           6. БАННЕРЫ И АНАЛИТИКА (HERO & ANALYTICS)
           ========================================================================== */
        .hero-banner {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }

        .hero-text h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .hero-text p {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 620px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .stat-card-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .stat-icon-box {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon-box.total { background: var(--bg); color: var(--text-main); }
        .stat-icon-box.done { background: var(--success-light); color: var(--success); }
        .stat-icon-box.percent { background: var(--primary-light); color: var(--primary); }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--text-main);
        }

        .progress-track {
            background: var(--border);
            height: 6px;
            border-radius: 10px;
            width: 100%;
            margin-top: 14px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .filter-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .select-custom {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-muted);
            outline: none;
            cursor: pointer;
            transition: var(--transition);
        }

        /* ==========================================================================
           7. СТРУКТУРА ДАННЫХ И КАРТОЧКИ (FOLDERS & TASKS)
           ========================================================================== */
        .workspace-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .workspace-title-row h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .folders-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .folder-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: var(--transition);
        }

        .folder-box:hover {
            border-color: var(--border-hover);
        }

        .folder-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: rgba(0,0,0,0.01);
            cursor: pointer;
            user-select: none;
        }

        .folder-meta {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .chevron-icon {
            color: var(--text-ghost);
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .folder-box.is-open .chevron-icon {
            transform: rotate(90deg);
        }

        .folder-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .folder-trigger:hover .controls-group,
        .section-bar:hover .controls-group,
        .task-row:hover .controls-group {
            opacity: 1;
        }

        .folder-dropzone {
            display: none;
            padding: 8px 24px 24px 24px;
            border-top: 1px solid var(--border);
            background: var(--card-bg);
            flex-direction: column;
            gap: 24px;
        }

        .folder-box.is-open .folder-dropzone {
            display: flex;
        }

        .section-block {
            padding-left: 16px;
            border-left: 2px solid var(--border);
        }

        .section-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            margin-bottom: 12px;
        }

        .section-identity {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tasks-bundle {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .task-row:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-sm);
            transform: translateX(4px);
        }

        .task-interactive {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            cursor: pointer;
            min-width: 0;
        }

        .checkbox-container {
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-ghost);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            background: transparent;
            flex-shrink: 0;
        }

        .checkbox-container svg {
            display: none;
            color: #FFFFFF;
        }

        .task-row.is-completed .checkbox-container {
            background: var(--success);
            border-color: var(--success);
        }

        .task-row.is-completed .checkbox-container svg {
            display: block;
        }

        .task-details-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .task-title-text {
            font-size: 14.5px;
            font-weight: 500;
            color: var(--text-main);
            transition: var(--transition);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-row.is-completed .task-title-text {
            color: var(--text-ghost);
            text-decoration: line-through;
        }

        .task-meta-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .task-date {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .empty-state {
            padding: 36px;
            text-align: center;
            color: var(--text-ghost);
            font-size: 14px;
            border: 1px dashed var(--border);
            border-radius: var(--radius-md);
            background: rgba(0,0,0,0.005);
        }

        /* ==========================================================================
           8. МОДАЛЬНЫЕ ОКНА И ДИАЛОГИ (MODALS & CUSTOM CONFIRM)
           ========================================================================== */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-surface {
            background: var(--modal-bg);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
            transform: scale(0.95);
            opacity: 0;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-mask.is-active {
            display: flex;
        }

        .modal-mask.is-active .modal-surface {
            transform: scale(1);
            opacity: 1;
        }

        .modal-top {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-top h3 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .modal-close-trigger {
            background: transparent;
            border: none;
            font-size: 24px;
            color: var(--text-ghost);
            cursor: pointer;
            line-height: 1;
        }

        .modal-close-trigger:hover {
            color: var(--text-main);
        }

        .modal-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .field-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-box label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .field-box input, .field-box select, .field-box textarea {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            background: var(--card-bg);
            transition: var(--transition);
            width: 100%;
        }

        .field-box input:focus, .field-box select:focus, .field-box textarea:focus {
            border-color: var(--primary);
            box-shadow: 0px 0px 0px 3px var(--primary-alpha);
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .modal-actions-row {
            padding: 18px 24px;
            background: rgba(0,0,0,0.01);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .confirm-surface {
            max-width: 400px;
            text-align: center;
        }

        .confirm-icon-illustration {
            width: 56px;
            height: 56px;
            background: var(--danger-light);
            color: var(--danger);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 24px auto 16px auto;
        }

        .confirm-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            padding: 0 24px;
        }

        .confirm-desc {
            font-size: 14px;
            color: var(--text-muted);
            padding: 0 24px 24px 24px;
            line-height: 1.5;
        }

        /* ==========================================================================
           9. СИСТЕМА УВЕДОМЛЕНИЙ (TOAST NOTIFICATIONS)
           ========================================================================== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast-card {
            background: var(--modal-bg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            padding: 14px 20px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
            pointer-events: auto;
            transform: translateY(40px);
            opacity: 0;
            animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            border-left: 4px solid var(--primary);
        }

        @keyframes toastIn {
            to { transform: translateY(0); opacity: 1; }
        }

        .toast-card.success { border-left-color: var(--success); }
        .toast-card.danger { border-left-color: var(--danger); }
        .toast-card.info { border-left-color: var(--info); }

        /* ==========================================================================
           10. НАСТРОЙКИ, ПРОФИЛЬ И ИМПОРТ/ЭКСПОРТ
           ========================================================================== */
        .settings-view-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .settings-section-title {
            font-size: 16px;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        .profile-settings-flex {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .profile-editable-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary);
        }

        .data-management-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* ==========================================================================
           11. МОБИЛЬНАЯ АДАПТАЦИЯ (COMPACT SMARTPHONE MODE)
           ========================================================================== */
        @media (max-width: 991px) {
            .sidebar {
                transform: translateX(-100%);
                box-shadow: none;
            }
            .sidebar.is-mobile-open {
                transform: translateX(0);
                box-shadow: var(--shadow-lg);
            }
            .main-wrapper {
                margin-left: 0;
            }
            .topbar {
                padding: 0 20px;
            }
            .menu-toggle {
                display: block;
            }
            .search-hint {
                display: none;
            }
            .content-container {
                padding: 24px 20px;
            }
            .hero-banner {
                flex-direction: column;
                align-items: stretch;
                padding: 24px;
                gap: 20px;
            }
            .hero-banner button {
                width: 100%;
            }
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .controls-group {
                opacity: 1;
            }
            .field-row {
                grid-template-columns: 1fr;
            }
            .sidebar-backdrop {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.4);
                z-index: 95;
                display: none;
                backdrop-filter: blur(4px);
            }
            body.sidebar-active .sidebar-backdrop {
                display: block;
            }
        }
    </style>
</head>

    <script>
        // ДЕФОЛТНОЕ СОСТОЯНИЕ (БАЗА ДАННЫХ ПРИЛОЖЕНИЯ)
        let state = [
            {
                id: "f1",
                name: "Высшая математика",
                isOpen: true,
                sections: [
                    {
                        id: "s1",
                        name: "Модуль 1. Интегралы",
                        tasks: [
                            { id: "t1", title: "Вычислить двойной интеграл из методички", priority: "high", date: "2026-06-15", isCompleted: false },
                            { id: "t2", title: "Подготовиться к коллоквиуму по теории", priority: "medium", date: "2026-06-18", isCompleted: true }
                        ]
                    },
                    {
                        id: "s2",
                        name: "Модуль 2. Дифференциальные уравнения",
                        tasks: [
                            { id: "t3", title: "Решить уравнения Бернулли (Задачи 5-10)", priority: "low", date: "2026-06-25", isCompleted: false }
                        ]
                    }
                ]
            },
            {
                id: "f2",
                name: "Проектирование интерфейсов (UI/UX)",
                isOpen: false,
                sections: [
                    {
                        id: "s3",
                        name: "Курсовая работа",
                        tasks: [
                            { id: "t4", title: "Создать интерактивный прототип в Figma", priority: "high", date: "2026-06-20", isCompleted: false },
                            { id: "t5", title: "Провести юзабилити-тестирование на фокус-группе", priority: "medium", date: "2026-06-22", isCompleted: false }
                        ]
                    }
                ]
            }
        ];

        // Системные настройки профиля
        let profile = {
            name: "Алексей Иванов",
            role: "Студент ИТ-факультета"
        };

        // Текущий активный экран навигации
        let currentView = "dashboard";
        let searchQuery = "";

        // Инициализация локального хранилища (localStorage)
        if (localStorage.getItem("taskflow_state")) {
            try {
                state = JSON.parse(localStorage.getItem("taskflow_state"));
            } catch(e) { console.error("Ошибка парсинга стейта из localStorage"); }
        }
        if (localStorage.getItem("taskflow_profile")) {
            try {
                profile = JSON.parse(localStorage.getItem("taskflow_profile"));
            } catch(e) { console.error("Ошибка парсинга профиля из localStorage"); }
        }

        function saveState() {
            localStorage.setItem("taskflow_state", JSON.stringify(state));
            updateBadges();
        }

        function saveProfile() {
            localStorage.setItem("taskflow_profile", JSON.stringify(profile));
            updateProfileUI();
        }

        // РАБОТА С ТЕМАМИ ОФОРМЛЕНИЯ
        function initTheme() {
            const savedTheme = localStorage.getItem('taskflow_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcons(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('taskflow_theme', newTheme);
            updateThemeIcons(newTheme);
        }

        function updateThemeIcons(theme) {
            if (theme === 'dark') {
                document.getElementById('themeIconMoon').style.display = 'none';
                document.getElementById('themeIconSun').style.display = 'block';
            } else {
                document.getElementById('themeIconMoon').style.display = 'block';
                document.getElementById('themeIconSun').style.display = 'none';
            }
        }

        // СИСТЕМА УВЕДОМЛЕНИЙ (TOAST)
        function showToast(text, type = "success") {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            toast.className = `toast-card ${type}`;
            toast.innerText = text;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = "none";
                toast.offsetHeight; // trigger reflow
                toast.style.transition = "all 0.3s cubic-bezier(0.16, 1, 0.3, 1)";
                toast.style.opacity = "0";
                toast.style.transform = "translateY(-20px)";
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // МОДАЛЬНЫЕ ОКНА: ОТКРЫТИЕ И ЗАКРЫТИЕ
        function openModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add("is-active");
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove("is-active");
        }

        // СИСТЕМА КАСТОМНЫХ ДИАЛОГОВ ПОДТВЕРЖДЕНИЯ (CONFIRM)
        let confirmCallback = null;
        function openConfirmDialog(title, desc, callback) {
            document.getElementById("confirmTitle").innerText = title;
            document.getElementById("confirmDesc").innerText = desc;
            confirmCallback = callback;
            openModal("confirmModal");
        }

        document.getElementById("confirmExecuteBtn").onclick = () => {
            if (confirmCallback) confirmCallback();
            closeModal("confirmModal");
            confirmCallback = null;
        };

        // ОБНОВЛЕНИЕ СЧЕТЧИКОВ (BADGES) В БОКОВОМ МЕНЮ
        function updateBadges() {
            let totalActive = 0;
            let totalHigh = 0;

            state.forEach(folder => {
                folder.sections.forEach(section => {
                    section.tasks.forEach(task => {
                        if (!task.isCompleted) {
                            totalActive++;
                            if (task.priority === "high") {
                                totalHigh++;
                            }
                        }
                    });
                });
            });

            document.getElementById("badgeAll").innerText = totalActive;
            document.getElementById("badgeFav").innerText = totalHigh;
        }

        // ОБНОВЛЕНИЕ ДАННЫХ ПРОФИЛЯ В ИНТЕРФЕЙСЕ
        function updateProfileUI() {
            const avatarChar = profile.name ? profile.name.charAt(0) : "U";
            document.getElementById("globalUserAvatar").innerText = avatarChar;
            document.getElementById("globalUserName").innerText = profile.name || "Пользователь";
            document.getElementById("globalUserRole").innerText = profile.role || "Студент";
        }

        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ДЛЯ РАБОТЫ С ДАТАМИ
        function formatDisplayDate(dateStr) {
            if (!dateStr) return "Без дедлайна";
            const options = { day: 'numeric', month: 'short' };
            const date = new Date(dateStr);
            return date.toLocaleDateString('ru-RU', options);
        }

        function checkIsOverdue(dateStr, isCompleted) {
            if (!dateStr || isCompleted) return false;
            const today = new Date();
            today.setHours(0,0,0,0);
            const target = new Date(dateStr);
            target.setHours(0,0,0,0);
            return target < today;
        }

        // СБОР ВСЕХ СУЩЕСТВУЮЩИХ ЗАДАЧ ДЛЯ ЕДИНЫХ ЭКРАНОВ С ФИЛЬТРАЦИЕЙ И ПОИСКОМ
        function gatherAllTasks() {
            let list = [];
            state.forEach(folder => {
                folder.sections.forEach(section => {
                    section.tasks.forEach(task => {
                        list.push({
                            ...task,
                            folderId: folder.id,
                            folderName: folder.name,
                            sectionId: section.id,
                            sectionName: section.name
                        });
                    });
                });
            });
            return list;
        }

        // ХЭЛПЕР ДЛЯ ГЕНЕРАЦИИ БОГАТЫХ БЕЙДЖЕЙ С ИКОНКАМИ LUCIDE
        function getPremiumPriorityBadgeHTML(priority) {
            if (priority === 'high') {
                return `<span class="badge-priority priority-high"><i data-lucide="zap" style="width:11px; height:11px; stroke-width:3;"></i>Высокий</span>`;
            } else if (priority === 'medium') {
                return `<span class="badge-priority priority-medium"><i data-lucide="clock" style="width:11px; height:11px; stroke-width:3;"></i>Средний</span>`;
            } else {
                return `<span class="badge-priority priority-low"><i data-lucide="arrow-down" style="width:11px; height:11px; stroke-width:3;"></i>Низкий</span>`;
            }
        }

        // ОСНОВНАЯ ФУНКЦИЯ РЕНДЕРИНГА ИНТЕРФЕЙСА (CORE UI RENDERER)
        function renderContent() {
            const container = document.getElementById("mainViewContent");
            container.innerHTML = "";

            // Фильтрация по поиску
            let tasksPool = gatherAllTasks();
            if (searchQuery.trim() !== "") {
                const q = searchQuery.toLowerCase();
                tasksPool = tasksPool.filter(t => t.title.toLowerCase().includes(q));
                renderSearchResultsView(container, tasksPool);
                lucide.createIcons();
                return;
            }

            // Рендеринг в зависимости от экрана
            switch(currentView) {
                case "dashboard":
                    renderDashboardView(container);
                    break;
                case "all":
                    renderUnifiedTasksView(container, "Все активные задачи", tasksPool.filter(t => !t.isCompleted));
                    break;
                case "favorites":
                    renderUnifiedTasksView(container, "Задачи с высоким приоритетом", tasksPool.filter(t => t.priority === "high" && !t.isCompleted));
                    break;
                case "archive":
                    renderUnifiedTasksView(container, "Архив выполненных задач", tasksPool.filter(t => t.isCompleted), true);
                    break;
                case "settings":
                    renderSettingsView(container);
                    break;
            }

            // Автоматическое превращение тегов <i> в иконки Lucide на лету
            lucide.createIcons();
        }

        // ЭКРАН 3: РЕЗУЛЬТАТЫ ДИНАМИЧЕСКОГО ПОИСКА
        function renderSearchResultsView(container, matchedTasks) {
            let html = `
                <div class="workspace-title-row" style="margin-bottom: 32px;">

                matchedTasks.forEach(task => {

                    html += `
                        <div class="task-row ${compClass}">
                            <div class="task-interactive" onclick="toggleTaskStatus('${task.id}')">
                                <div class="checkbox-container">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>

                                    <div class="task-meta-info">
                                        <span style="color: var(--primary); font-weight: 500;">${task.folderName} &rarr; ${task.sectionName}</span>
                                        <span class="task-date" ${isOverdue ? 'style="color: var(--danger);"' : ''}>
                                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                            ${formatDisplayDate(task.date)} ${task.isCompleted ? '(Выполнена)' : ''}
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                ${getPremiumPriorityBadgeHTML(task.priority)}
                            </div>
                        </div>
                    `;
                });
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        // ЭКРАН 4: НАСТРОЙКИ, ПРОФИЛЬ, БЕКАПЫ И СБРОС (SETTINGS VIEW)
        function renderSettingsView(container) {
            container.innerHTML = `
                <div class="workspace-title-row" style="margin-bottom: 32px;">
                    <h2>Настройки и управление профилем</h2>
                </div>
                
                <div class="settings-view-card">
                    <div>
                        <h3 class="settings-section-title">Данные пользователя</h3>
                        <div class="profile-settings-flex">
                            <div class="profile-editable-avatar" id="settingsAvatarPlaceholder">U</div>
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 12px;">
                                <div class="field-box">
                                    <label>Ваше имя</label>
                                    <input type="text" id="settingsNameInput" value="${profile.name}">
                                </div>
                                <div class="field-box">
                                    <label>Роль / Описание</label>
                                    <input type="text" id="settingsRoleInput" value="${profile.role}">
                                </div>
                                <button class="btn btn-primary" style="align-self: flex-start;" onclick="updateProfileData()">Сохранить профиль</button>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h3 class="settings-section-title">Резервное копирование и управление данными</h3>
                        <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5;">Вы можете экспортировать всю структуру созданных папок, разделов и задач в зашифрованный файл резервной копии конфигурации JSON для переноса на другие устройства, либо восстановить данные.</p>
                        <div class="data-management-buttons">
                            <button class="btn btn-secondary" onclick="exportDataToJSON()">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                Экспорт бэкапа (JSON)
                            </button>
                            <button class="btn btn-secondary" onclick="triggerImportFileInput()">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                Импорт бэкапа (JSON)
                            </button>
                            <button class="btn btn-danger" style="background: transparent; border-color: var(--border-hover); color: var(--danger);" onclick="resetDataRequest()">Очистить все данные</button>
                        </div>
                    </div>
                </div>
            `;
            // Установка буквы аватара в настройках
            document.getElementById("settingsAvatarPlaceholder").innerText = profile.name ? profile.name.charAt(0) : "U";
        }

        // КЛИК-ЛИСТЕНЕР ДЛЯ СВЕРТЫВАНИЯ/РАЗВЕРТЫВАНИЯ ПАПОК
        function toggleFolderCollapse(id) {
            const folder = state.find(f => f.id === id);
            if (folder) {
                folder.isOpen = !folder.isOpen;
                saveState();
                
                // Переключение классов анимации в DOM дереве без полной перерисовки
                const folderBox = document.querySelector(`.folder-box[data-id="${id}"]`);
                if (folderBox) {
                    folderBox.classList.toggle("is-open");
                }
            }
        }

        // ФУНКЦИОНАЛ ПАПОК (ОПЕРАЦИИ СОЗДАНИЯ, РЕДАКТИРОВАНИЯ И УДАЛЕНИЯ)
        function openCreateFolderModal() {
            document.getElementById("folderModalTitle").innerText = "Создать новую папку";
            document.getElementById("folderModalId").value = "";
            document.getElementById("folderNameInput").value = "";
            openModal("folderModal");
        }

        function openEditFolderModal(id, name) {
            document.getElementById("folderModalTitle").innerText = "Редактировать папку";
            document.getElementById("folderModalId").value = id;
            document.getElementById("folderNameInput").value = name;
            openModal("folderModal");
        }

        document.getElementById("saveFolderBtn").onclick = () => {
            const id = document.getElementById("folderModalId").value;
            const name = document.getElementById("folderNameInput").value.trim();

            if (!name) {
                showToast("Пожалуйста, заполните название папки", "danger");
                return;
            }

            if (id) {
                // Редактирование
                const folder = state.find(f => f.id === id);
                if (folder) folder.name = name;
                showToast("Название папки успешно обновлено");
            } else {
                // Создание новой
                state.push({
                    id: "f_" + Date.now(),
                    name: name,
                    isOpen: true,
                    sections: []
                });
                showToast("Папка успешно создана");
            }

            saveState();
            closeModal("folderModal");
            renderContent();
        };

        function deleteFolderRequest(id) {
            openConfirmDialog(
                "Удалить выбранную папку?", 
                "Внимание! Это действие полностью сотрет данную учебную папку, включая все внутренние разделы и все записанные в них задачи.",
                () => {
                    state = state.filter(f => f.id !== id);
                    saveState();
                    showToast("Папка успешно удалена", "danger");
                    renderContent();
                }
            );
        }

        // ФУНКЦИОНАЛ СЕКЦИЙ/РАЗДЕЛОВ (ОПЕРАЦИИ СОЗДАНИЯ, РЕДАКТИРОВАНИЯ И УДАЛЕНИЯ)
        function openCreateSectionModal(folderId) {
            document.getElementById("sectionModalTitle").innerText = "Добавить новый раздел";
            document.getElementById("sectionModalFolderId").value = folderId;
            document.getElementById("sectionModalId").value = "";
            document.getElementById("sectionNameInput").value = "";
            openModal("sectionModal");
        }

        function openEditSectionModal(folderId, sectionId, sectionName) {
            document.getElementById("sectionModalTitle").innerText = "Редактировать раздел";
            document.getElementById("sectionModalFolderId").value = folderId;
            document.getElementById("sectionModalId").value = sectionId;
            document.getElementById("sectionNameInput").value = sectionName;
            openModal("sectionModal");
        }

        document.getElementById("saveSectionBtn").onclick = () => {
            const folderId = document.getElementById("sectionModalFolderId").value;
            const sectionId = document.getElementById("sectionModalId").value;
            const name = document.getElementById("sectionNameInput").value.trim();

            if (!name) {
                showToast("Укажите название подраздела", "danger");
                return;
            }

            const folder = state.find(f => f.id === folderId);
            if (!folder) return;

            if (sectionId) {
                // Редактирование секции
                const section = folder.sections.find(s => s.id === sectionId);
                if (section) section.name = name;
                showToast("Раздел успешно переименован");
            } else {
                // Добавление новой секции
                folder.sections.push({
                    id: "s_" + Date.now(),
                    name: name,
                    tasks: []
                });
                folder.isOpen = true; // Принудительно открываем папку
                showToast("Новый подраздел добавлен");
            }

            saveState();
            closeModal("sectionModal");
            renderContent();
        };

        function deleteSectionRequest(folderId, sectionId) {
            openConfirmDialog(
                "Удалить данный подраздел?",
                "Все текущие активные и завершенные задачи внутри этого раздела будут безвозвратно удалены.",
                () => {
                    const folder = state.find(f => f.id === folderId);
                    if (folder) {
                        folder.sections = folder.sections.filter(s => s.id !== sectionId);
                        saveState();
                        showToast("Раздел успешно удален", "danger");
                        renderContent();
                    }
                }
            );
        }

        // ФУНКЦИОНАЛ ОПЕРАЦИЙ НАД ЗАДАЧАМИ (CRUD & TOGGLE COMLPETE)
        function openCreateTaskModal(folderId, sectionId) {
            document.getElementById("taskModalTitle").innerText = "Добавить учебную задачу";
            document.getElementById("taskModalFolderId").value = folderId;
            document.getElementById("taskModalSectionId").value = sectionId;
            document.getElementById("taskModalId").value = "";
            document.getElementById("taskTitleInput").value = "";
            document.getElementById("taskPriorityInput").value = "medium";
            
            // Заполнение даты по умолчанию (сегодня)
            const today = new Date().toISOString().split('T')[0];
            document.getElementById("taskDateInput").value = today;
            
            openModal("taskModal");
        }

        function openEditTaskModal(folderId, sectionId, taskId) {
            const folder = state.find(f => f.id === folderId);
            if (!folder) return;
            const section = folder.sections.find(s => s.id === sectionId);
            if (!section) return;
            const task = section.tasks.find(t => t.id === taskId);
            if (!task) return;

            document.getElementById("taskModalTitle").innerText = "Редактировать параметры задачи";
            document.getElementById("taskModalFolderId").value = folderId;
            document.getElementById("taskModalSectionId").value = sectionId;
            document.getElementById("taskModalId").value = taskId;
            document.getElementById("taskTitleInput").value = task.title;
            document.getElementById("taskPriorityInput").value = task.priority;
            document.getElementById("taskDateInput").value = task.date || "";
            
            openModal("taskModal");
        }

        document.getElementById("saveTaskBtn").onclick = () => {
            const folderId = document.getElementById("taskModalFolderId").value;
            const sectionId = document.getElementById("taskModalSectionId").value;
            const taskId = document.getElementById("taskModalId").value;
            
            const title = document.getElementById("taskTitleInput").value.trim();
            const priority = document.getElementById("taskPriorityInput").value;
            const date = document.getElementById("taskDateInput").value;

            if (!title) {
                showToast("Введите текст формулировки задачи!", "danger");
                return;
            }

            const folder = state.find(f => f.id === folderId);
            if (!folder) return;
            const section = folder.sections.find(s => s.id === sectionId);
            if (!section) return;

            if (taskId) {
                // Обновление существующей задачи
                const task = section.tasks.find(t => t.id === taskId);
                if (task) {
                    task.title = title;
                    task.priority = priority;
                    task.date = date;
                }
                showToast("Изменения в задаче сохранены");
            } else {
                // Создание новой задачи
                section.tasks.push({
                    id: "t_" + Date.now(),
                    title: title,
                    priority: priority,
                    date: date,
                    isCompleted: false
                });
                showToast("Задача успешно добавлена в список");
            }

            saveState();
            closeModal("taskModal");
            renderContent();
        };

        function toggleTaskStatus(taskId) {
            let found = false;
            state.forEach(f => f.sections.forEach(s => s.tasks.forEach(t => {
                if (t.id === taskId) {
                    t.isCompleted = !t.isCompleted;
                    found = true;
                    if (t.isCompleted) {
                        showToast("Задача перемещена в архив выполненных!");
                    } else {
                        showToast("Задача возвращена в список активных дел");
                    }
                }
            })));

            if (found) {
                saveState();
                renderContent();
            }
        }

        function deleteTaskRequest(taskId) {
            openConfirmDialog(
                "Удалить задачу окончательно?",
                "Вы собираетесь удалить данную задачу. Восстановление будет невозможно.",
                () => {
                    state.forEach(f => f.sections.forEach(s => {
                        s.tasks = s.tasks.filter(t => t.id !== taskId);
                    }));
                    saveState();
                    showToast("Задача безвозвратно удалена", "danger");
                    renderContent();
                }
            );
        }

        // ОБНОВЛЕНИЕ ПРОФИЛЯ СТРАНИЦЫ НАСТРОЕК
        function updateProfileData() {
            const newName = document.getElementById("settingsNameInput").value.trim();
            const newRole = document.getElementById("settingsRoleInput").value.trim();

            if (!newName) {
                showToast("Имя профиля не может быть пустым!", "danger");
                return;
            }

            profile.name = newName;
            profile.role = newRole;
            saveProfile();
            showToast("Данные личного профиля успешно сохранены!");
            
            // Динамическое обновление заголовка
            document.getElementById("settingsAvatarPlaceholder").innerText = newName.charAt(0);
        }

        // СБРОС ВСЕХ НАСТРОЕК ДО ЗАВОДСКИХ
        function resetDataRequest() {
            openConfirmDialog(
                "Полностью стереть всю конфигурацию?",
                "Это приведет к полному безвозвратному удалению всех ваших папок, предметов, архивов и сбросу настроек.",
                () => {
                    state = [];
                    profile = { name: "Пользователь", role: "Студент" };
                    saveState();
                    saveProfile();
                    showToast("Все данные успешно очищены!", "danger");
                    document.querySelector('[data-view="dashboard"]').click();
                }
            );
        }

        // ЭКСПОРТ В JSON ФАЙЛ
        function exportDataToJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "taskflow_pro_backup.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
            showToast("Файл резервной копии успешно сгенерирован");
        }

        // ТРИГГЕР ИМПОРТА
        function triggerImportFileInput() {
            document.getElementById("importFileHidden").click();
        }

        // ИНИЦИАЛИЗАЦИЯ ДИНАМИЧЕСКИХ СЛУШАТЕЛЕЙ (LISTENERS)
        function initGlobalListeners() {
            // Переключатель темы
            document.getElementById('themeSwitchBtn').addEventListener('click', toggleTheme);

            // Обработка кликов по боковому меню
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    navItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    currentView = item.getAttribute('data-view');
                    
                    // Сброс поиска при переходе по табам
                    searchQuery = "";
                    document.getElementById("searchInput").value = "";
                    
                    // Закрытие шторки на мобилках при клике на пункт
                    document.getElementById('appSidebar').classList.remove('is-mobile-open');
                    document.body.classList.remove('sidebar-active');

                    renderContent();
                });
            });

            // Мобильное управление меню (открытие/закрытие)
            document.getElementById('openSidebarBtn').onclick = () => {
                document.getElementById('appSidebar').classList.add('is-mobile-open');
                document.body.classList.add('sidebar-active');
            };

            const closeSidebar = () => {
                document.getElementById('appSidebar').classList.remove('is-mobile-open');
                document.body.classList.remove('sidebar-active');
            };
            
            document.getElementById('closeSidebarBtn').onclick = closeSidebar;
            document.getElementById('sidebarBackdrop').onclick = closeSidebar;

            // Логика живого поиска в реальном времени
            document.getElementById("searchInput").oninput = (e) => {
                searchQuery = e.target.value;
                renderContent();
            };

            // Импорт из файла JSON
            document.getElementById('importFileHidden').onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (Array.isArray(importedData)) {
                            state = importedData;
                            saveState();
                            showToast('Резервная копия успешно восстановлена!', 'success');
                            document.querySelector('[data-view="dashboard"]').click();
                        } else {
                            showToast('Неверная структура JSON файла', 'danger');
                        }
                    } catch (err) {
                        showToast('Ошибка при чтении файла JSON', 'danger');
                    }
                };
                reader.readAsText(file);
            };
        }

        // Инициализация при старте приложения
        window.addEventListener('DOMContentLoaded', () => {
            initTheme();
            updateBadges();
            updateProfileUI();
            initGlobalListeners();
            renderContent();
        });
    </script>
</body>
</html>
