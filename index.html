<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>TaskFlow Pro — Премиальный образовательный таск-менеджер</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. ДИЗАЙН-СИСТЕМА И ПЕРЕМЕННЫЕ (СВЕТЛАЯ И ТЕМНАЯ ТЕМА)
           ========================================================================== */
        :root {
            --primary: #FF7A00;
            --primary-light: #FFF0E0;
            --primary-hover: #E56E00;
            --primary-alpha: rgba(255, 122, 0, 0.08);
            --bg: #FAFAFA;
            --sidebar-bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --modal-bg: #FFFFFF;
            
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --text-ghost: #999999;
            --text-on-primary: #FFFFFF;
            
            --border: #EEEEEE;
            --border-hover: #D8D8D8;
            --border-focus: #FF7A00;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --radius-xs: 4px;

            --danger: #FF3B30;
            --danger-light: #FFEBEB;
            --success: #00B341;
            --success-light: #E6F9EE;
            --warning: #FFCC00;
            --info: #007AFF;
            
            --shadow-sm: 0px 1px 2px rgba(0, 0, 0, 0.02), 0px 4px 12px rgba(0, 0, 0, 0.03);
            --shadow-md: 0px 4px 12px rgba(0, 0, 0, 0.05), 0px 16px 40px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0px 12px 24px rgba(0, 0, 0, 0.08), 0px 32px 64px rgba(0, 0, 0, 0.08);
            
            --transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            --sidebar-width: 280px;
        }

        [data-theme="dark"] {
            --primary: #FF8A1F;
            --primary-light: #2C1A08;
            --primary-hover: #FF9F43;
            --primary-alpha: rgba(255, 138, 31, 0.15);
            --bg: #0B0B0C;
            --sidebar-bg: #121214;
            --card-bg: #161619;
            --modal-bg: #1A1A1E;
            
            --text-main: #F5F5F7;
            --text-muted: #A0A0A5;
            --text-ghost: #636366;
            
            --border: #222226;
            --border-hover: #323238;
            --border-focus: #FF8A1F;
            
            --shadow-sm: 0px 1px 2px rgba(0, 0, 0, 0.2), 0px 4px 12px rgba(0, 0, 0, 0.3);
            --shadow-md: 0px 4px 12px rgba(0, 0, 0, 0.4), 0px 16px 40px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0px 12px 24px rgba(0, 0, 0, 0.5), 0px 32px 64px rgba(0, 0, 0, 0.5);

            --danger: #FF453A;
            --danger-light: #2C1514;
            --success: #32D74B;
            --success-light: #122C17;
        }

        /* ==========================================================================
           2. БАЗОВЫЕ СТИЛИ И СБРОС СТАНДАРТНЫХ СВОЙСТВ
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            letter-spacing: -0.011em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-hover);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-ghost);
        }

        input, select, textarea, button {
            font-family: inherit;
            font-size: inherit;
            color: inherit;
        }

        /* ==========================================================================
           3. КОМПОНЕНТЫ И КНОПКИ (UI COMPONENTS)
           ========================================================================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            user-select: none;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--text-on-primary);
            box-shadow: 0px 2px 4px rgba(255, 122, 0, 0.15);
            font-weight: 600;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0px 4px 12px rgba(255, 122, 0, 0.25);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--card-bg);
            border-color: var(--border);
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary:hover {
            background: var(--bg);
            border-color: var(--border-hover);
        }

        .btn-danger {
            background: var(--danger);
            color: #FFFFFF;
            box-shadow: 0px 2px 4px rgba(255, 59, 48, 0.15);
        }

        .btn-danger:hover {
            background: #E03126;
            transform: translateY(-1px);
        }

        .icon-btn {
            width: 30px;
            height: 30px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background: var(--border);
            color: var(--text-main);
        }

        .icon-btn.danger-hover:hover {
            background: var(--danger-light);
            color: var(--danger);
        }

        .badge-priority {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .priority-high { background: var(--danger-light); color: var(--danger); }
        .priority-medium { background: var(--primary-light); color: var(--primary); }
        .priority-low { background: rgba(0, 122, 255, 0.1); color: var(--info); }

        /* ==========================================================================
           4. ЛЕЙАУТ И БОКОВАЯ ПАНЕЛЬ (SIDEBAR)
           ========================================================================== */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
            transition: var(--transition);
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background-color: var(--primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0px 4px 10px rgba(255, 122, 0, 0.25);
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.04em;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            padding: 0 12px;
            gap: 4px;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            cursor: pointer;
            user-select: none;
        }

        .nav-item-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item svg {
            color: var(--text-ghost);
            transition: var(--transition);
        }

        .nav-item:hover {
            background-color: var(--bg);
            color: var(--text-main);
        }

        .nav-item:hover svg {
            color: var(--text-muted);
        }

        .nav-item.active {
            background-color: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
        }

        .nav-item.active svg {
            color: var(--primary);
        }

        .nav-badge {
            background: var(--border);
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .nav-item.active .nav-badge {
            background: var(--primary);
            color: var(--text-on-primary);
        }

        .nav-divider {
            height: 1px;
            background-color: var(--border);
            margin: 12px 12px;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.01);
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            border: 1px solid rgba(255, 122, 0, 0.15);
            text-transform: uppercase;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .user-role {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        /* ==========================================================================
           5. ГЛАВНАЯ ОБЛАСТЬ И ПАНЕЛЬ НАВИГАЦИИ (TOPBAR)
           ========================================================================== */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .topbar {
            height: 64px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            max-width: 540px;
        }

        .menu-toggle {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 4px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg);
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            width: 100%;
            transition: var(--transition);
            border: 1px solid var(--border);
        }

        .search-box:focus-within {
            background: var(--card-bg);
            border-color: var(--primary);
            box-shadow: 0px 0px 0px 3px var(--primary-alpha);
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: var(--text-main);
            width: 100%;
        }

        .search-hint {
            font-size: 11px;
            color: var(--text-ghost);
            background: var(--card-bg);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border);
            font-weight: 600;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .content-container {
            padding: 40px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            flex: 1;
        }

        /* ==========================================================================
           6. БАННЕРЫ И АНАЛИТИКА (HERO & ANALYTICS)
           ========================================================================== */
        .hero-banner {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }

        .hero-text h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .hero-text p {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 620px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .stat-card-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .stat-icon-box {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon-box.total { background: var(--bg); color: var(--text-main); }
        .stat-icon-box.done { background: var(--success-light); color: var(--success); }
        .stat-icon-box.percent { background: var(--primary-light); color: var(--primary); }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--text-main);
        }

        .progress-track {
            background: var(--border);
            height: 6px;
            border-radius: 10px;
            width: 100%;
            margin-top: 14px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .filter-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .select-custom {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-muted);
            outline: none;
            cursor: pointer;
            transition: var(--transition);
        }

        /* ==========================================================================
           7. СТРУКТУРА ДАННЫХ И КАРТОЧКИ (FOLDERS & TASKS)
           ========================================================================== */
        .workspace-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .workspace-title-row h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .folders-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .folder-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: var(--transition);
        }

        .folder-box:hover {
            border-color: var(--border-hover);
        }

        .folder-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: rgba(0,0,0,0.01);
            cursor: pointer;
            user-select: none;
        }

        .folder-meta {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .chevron-icon {
            color: var(--text-ghost);
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .folder-box.is-open .chevron-icon {
            transform: rotate(90deg);
        }

        .folder-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .folder-trigger:hover .controls-group,
        .section-bar:hover .controls-group,
        .task-row:hover .controls-group {
            opacity: 1;
        }

        .folder-dropzone {
            display: none;
            padding: 8px 24px 24px 24px;
            border-top: 1px solid var(--border);
            background: var(--card-bg);
            flex-direction: column;
            gap: 24px;
        }

        .folder-box.is-open .folder-dropzone {
            display: flex;
        }

        .section-block {
            padding-left: 16px;
            border-left: 2px solid var(--border);
        }

        .section-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            margin-bottom: 12px;
        }

        .section-identity {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tasks-bundle {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .task-row:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-sm);
            transform: translateX(4px);
        }

        .task-interactive {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            cursor: pointer;
            min-width: 0;
        }

        .checkbox-container {
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-ghost);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            background: transparent;
            flex-shrink: 0;
        }

        .checkbox-container svg {
            display: none;
            color: #FFFFFF;
        }

        .task-row.is-completed .checkbox-container {
            background: var(--success);
            border-color: var(--success);
        }

        .task-row.is-completed .checkbox-container svg {
            display: block;
        }

        .task-details-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .task-title-text {
            font-size: 14.5px;
            font-weight: 500;
            color: var(--text-main);
            transition: var(--transition);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-row.is-completed .task-title-text {
            color: var(--text-ghost);
            text-decoration: line-through;
        }

        .task-meta-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .task-date {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .empty-state {
            padding: 36px;
            text-align: center;
            color: var(--text-ghost);
            font-size: 14px;
            border: 1px dashed var(--border);
            border-radius: var(--radius-md);
            background: rgba(0,0,0,0.005);
        }

        /* ==========================================================================
           8. МОДАЛЬНЫЕ ОКНА И ДИАЛОГИ (MODALS & CUSTOM CONFIRM)
           ========================================================================== */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-surface {
            background: var(--modal-bg);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
            transform: scale(0.95);
            opacity: 0;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-mask.is-active {
            display: flex;
        }

        .modal-mask.is-active .modal-surface {
            transform: scale(1);
            opacity: 1;
        }

        .modal-top {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-top h3 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .modal-close-trigger {
            background: transparent;
            border: none;
            font-size: 24px;
            color: var(--text-ghost);
            cursor: pointer;
            line-height: 1;
        }

        .modal-close-trigger:hover {
            color: var(--text-main);
        }

        .modal-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .field-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-box label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .field-box input, .field-box select, .field-box textarea {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            background: var(--card-bg);
            transition: var(--transition);
            width: 100%;
        }

        .field-box input:focus, .field-box select:focus, .field-box textarea:focus {
            border-color: var(--primary);
            box-shadow: 0px 0px 0px 3px var(--primary-alpha);
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .modal-actions-row {
            padding: 18px 24px;
            background: rgba(0,0,0,0.01);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .confirm-surface {
            max-width: 400px;
            text-align: center;
        }

        .confirm-icon-illustration {
            width: 56px;
            height: 56px;
            background: var(--danger-light);
            color: var(--danger);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 24px auto 16px auto;
        }

        .confirm-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            padding: 0 24px;
        }

        .confirm-desc {
            font-size: 14px;
            color: var(--text-muted);
            padding: 0 24px 24px 24px;
            line-height: 1.5;
        }

        /* ==========================================================================
           9. СИСТЕМА УВЕДОМЛЕНИЙ (TOAST NOTIFICATIONS)
           ========================================================================== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast-card {
            background: var(--modal-bg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            padding: 14px 20px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
            pointer-events: auto;
            transform: translateY(40px);
            opacity: 0;
            animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            border-left: 4px solid var(--primary);
        }

        @keyframes toastIn {
            to { transform: translateY(0); opacity: 1; }
        }

        .toast-card.success { border-left-color: var(--success); }
        .toast-card.danger { border-left-color: var(--danger); }
        .toast-card.info { border-left-color: var(--info); }

        /* ==========================================================================
           10. НАСТРОЙКИ, ПРОФИЛЬ И ИМПОРТ/ЭКСПОРТ
           ========================================================================== */
        .settings-view-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .settings-section-title {
            font-size: 16px;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        .profile-settings-flex {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .profile-editable-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary);
        }

        .data-management-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* ==========================================================================
           11. МОБИЛЬНАЯ АДАПТАЦИЯ (COMPACT SMARTPHONE MODE)
           ========================================================================== */
        @media (max-width: 991px) {
            .sidebar {
                transform: translateX(-100%);
                box-shadow: none;
            }
            .sidebar.is-mobile-open {
                transform: translateX(0);
                box-shadow: var(--shadow-lg);
            }
            .main-wrapper {
                margin-left: 0;
            }
            .topbar {
                padding: 0 20px;
            }
            .menu-toggle {
                display: block;
            }
            .search-hint {
                display: none;
            }
            .content-container {
                padding: 24px 20px;
            }
            .hero-banner {
                flex-direction: column;
                align-items: stretch;
                padding: 24px;
                gap: 20px;
            }
            .hero-banner button {
                width: 100%;
            }
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .controls-group {
                opacity: 1;
            }
            .field-row {
                grid-template-columns: 1fr;
            }
            .sidebar-backdrop {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.4);
                z-index: 95;
                display: none;
                backdrop-filter: blur(4px);
            }
            body.sidebar-active .sidebar-backdrop {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <div class="toast-container" id="toastContainer"></div>

    <aside class="sidebar" id="appSidebar">
        <div class="sidebar-header">
            <a href="#" class="logo">
                <div class="logo-icon">T</div>

            <button class="menu-toggle" id="closeSidebarBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>

                    <span>Все задачи</span>

                    <span>Высокий приоритет</span>

                <span class="nav-badge" id="badgeFav">0</span>

                <div class="nav-item-content">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5" rx="1"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg>
                    <span>Архив выполненных</span>
                </div>
            </div>
            <div class="nav-divider"></div>
            <div class="nav-item" data-view="settings">
                <div class="nav-item-content">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    <span>Настройки и Профиль</span>
                </div>
            </div>
        </nav>
        <div class="sidebar-footer">
            <div class="user-avatar" id="globalUserAvatar">U</div>
            <div class="user-info">
                <span class="user-name" id="globalUserName">Пользователь</span>
                <span class="user-role" id="globalUserRole">Студент</span>
            </div>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="openSidebarBtn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" placeholder="Поиск задач по ключевым словам...">
                    <span class="search-hint">Поиск</span>
                </div>
            </div>
            <div class="topbar-right">
                <button class="btn btn-secondary" id="themeSwitchBtn" style="padding: 8px 12px;" title="Переключить тему оформления">
                    <svg id="themeIconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg id="themeIconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>

        <main class="content-container" id="mainViewContent">
            </main>

    <div class="modal-mask" id="folderModal">
        <div class="modal-surface">
            <div class="modal-top">
                <h3 id="folderModalTitle">Создать папку</h3>
                <button class="modal-close-trigger" onclick="closeModal('folderModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="folderModalId">
                <div class="field-box">
                    <label for="folderNameInput">Название папки</label>
                    <input type="text" id="folderNameInput" placeholder="Например: Математический анализ">
                </div>
            </div>
            <div class="modal-actions-row">
                <button class="btn btn-secondary" onclick="closeModal('folderModal')">Отмена</button>
                <button class="btn btn-primary" id="saveFolderBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="modal-mask" id="sectionModal">
        <div class="modal-surface">
            <div class="modal-top">
                <h3 id="sectionModalTitle">Добавить категорию/секцию</h3>
                <button class="modal-close-trigger" onclick="closeModal('sectionModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="sectionFolderId">
                <input type="hidden" id="sectionModalId">
                <div class="field-box">
                    <label for="sectionNameInput">Название секции</label>
                    <input type="text" id="sectionNameInput" placeholder="Например: Лекции, Практика">
                </div>
            </div>
            <div class="modal-actions-row">
                <button class="btn btn-secondary" onclick="closeModal('sectionModal')">Отмена</button>
                <button class="btn btn-primary" id="saveSectionBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="modal-mask" id="taskModal">
        <div class="modal-surface">
            <div class="modal-top">
                <h3 id="taskModalTitle">Создать задачу</h3>
                <button class="modal-close-trigger" onclick="closeModal('taskModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="taskModalId">
                <input type="hidden" id="taskFolderId">
                <input type="hidden" id="taskSectionId">

                <div class="field-box">
                    <label for="taskTitleInput">Название задачи</label>
                    <input type="text" id="taskTitleInput" placeholder="Что необходимо сделать?">
                </div>

                <div class="field-row">
                    <div class="field-box">
                        <label for="taskPrioritySelect">Приоритет</label>
                        <select id="taskPrioritySelect">
                            <option value="low">Низкий</option>
                            <option value="medium" selected>Средний</option>
                            <option value="high">Высокий</option>
                        </select>
                    </div>
                    <div class="field-box">
                        <label for="taskDateInput">Срок выполнения</label>
                        <input type="date" id="taskDateInput">
                    </div>
                </div>
            </div>
            <div class="modal-actions-row">
                <button class="btn btn-secondary" onclick="closeModal('taskModal')">Отмена</button>
                <button class="btn btn-primary" id="saveTaskBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="modal-mask" id="confirmModal">
        <div class="modal-surface confirm-surface">
            <div class="confirm-icon-illustration">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            </div>
            <h3 class="confirm-title" id="confirmModalTitle">Вы уверены?</h3>
            <p class="confirm-desc" id="confirmModalDesc">Это действие безвозвратно удалит выбранный элемент.</p>
            <div class="modal-actions-row" style="justify-content: center; background: transparent; border-top: none; padding-bottom: 24px;">
                <button class="btn btn-secondary" onclick="closeModal('confirmModal')">Отмена</button>
                <button class="btn btn-danger" id="confirmModalSubmitBtn">Удалить</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================================================
        // ИНИЦИАЛИЗАЦИЯ И СОСТОЯНИЕ
        // ==========================================================================
        let state = JSON.parse(localStorage.getItem('taskflow_state')) || [
            {
                id: "f1",
                name: "Университет",
                isOpen: true,
                sections: [
                    {
                        id: "s1",
                        name: "Высшая математика",
                        tasks: [
                            { id: "t1", title: "Подготовиться к коллоквиуму", priority: "high", date: "2026-06-15", isCompleted: false },
                            { id: "t2", title: "Домашнее задание №4", priority: "medium", date: "2026-06-12", isCompleted: true }
                        ]
                    }
                ]
            }
        ];

        let currentView = 'dashboard';
        let searchQuery = '';
        let filterPriority = 'all';
        let filterStatus = 'all';
        let confirmCallback = null;

        // Настройки профиля по умолчанию
        let profile = JSON.parse(localStorage.getItem('taskflow_profile')) || {
            name: "Иван Иванов",
            role: "Студент"
        };

        // ==========================================================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (UI И СИСТЕМНЫЕ)
        // ==========================================================================
        function saveState() {
            localStorage.setItem('taskflow_state', JSON.stringify(state));
            updateBadges();
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-card ${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.add('is-active');
            }
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.remove('is-active');
            }
        }

        function triggerConfirm(title, desc, callback) {
            document.getElementById('confirmModalTitle').innerText = title;
            document.getElementById('confirmModalDesc').innerText = desc;
            confirmCallback = callback;
            openModal('confirmModal');
        }

        // Переключение тем
        function initTheme() {
            const currentTheme = localStorage.getItem('taskflow_theme') || 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            toggleThemeIcons(currentTheme);
        }

        function toggleThemeIcons(theme) {
            if (theme === 'dark') {
                document.getElementById('themeIconMoon').style.display = 'none';
                document.getElementById('themeIconSun').style.display = 'block';
            } else {
                document.getElementById('themeIconMoon').style.display = 'block';
                document.getElementById('themeIconSun').style.display = 'none';
            }
        }

        // Обновление счетчиков в меню
        function updateBadges() {
            let total = 0;
            let high = 0;
            state.forEach(f => {
                f.sections.forEach(s => {
                    s.tasks.forEach(t => {
                        if (!t.isCompleted) {
                            total++;
                            if (t.priority === 'high') high++;
                        }
                    });
                });
            });
            document.getElementById('badgeAll').innerText = total;
            document.getElementById('badgeFav').innerText = high;
        }

        // Обновление информации о профиле в футере
        function updateProfileUI() {
            document.getElementById('globalUserName').innerText = profile.name;
            document.getElementById('globalUserRole').innerText = profile.role;
            document.getElementById('globalUserAvatar').innerText = profile.name.charAt(0).toUpperCase();
        }

        // ==========================================================================
        // РЕНДЕРИНГ ЭКРАНОВ
        // ==========================================================================
        function renderContent() {
            const container = document.getElementById('mainViewContent');
            
            if (currentView === 'settings') {
                container.innerHTML = `
                    <div class="workspace-title-row">
                        <h2>Настройки и Профиль</h2>
                    </div>
                    <div class="settings-view-card">
                        <div>
                            <div class="settings-section-title">Данные пользователя</div>
                            <div class="profile-settings-flex">
                                <div class="profile-editable-avatar" id="settingsAvatar">${profile.name.charAt(0).toUpperCase()}</div>
                                <div style="flex: 1; display:flex; flex-direction:column; gap:12px;">
                                    <div class="field-box">
                                        <label>Имя пользователя</label>
                                        <input type="text" id="profileNameInput" value="${profile.name}">
                                    </div>
                                    <div class="field-box">
                                        <label>Специализация / Роль</label>
                                        <input type="text" id="profileRoleInput" value="${profile.role}">
                                    </div>
                                    <button class="btn btn-primary" id="saveProfileBtn" style="align-self: flex-start;">Сохранить профиль</button>
                                </div>
                            </div>
                        </div>
                        <div>
                            <div class="settings-section-title">Управление данными</div>
                            <div class="data-management-buttons">
                                <button class="btn btn-secondary" id="exportDataBtn">Экспорт резервной копии (JSON)</button>
                                <button class="btn btn-secondary" onclick="document.getElementById('importFileHidden').click()">Импорт данных</button>
                                <input type="file" id="importFileHidden" style="display:none;" accept=".json">
                            </div>
                        </div>
                    </div>
                `;
                initSettingsListeners();
                return;
            }

            // Рендеринг Дашборда и Всех задач
            let html = '';

            // Шапка и фильтры в зависимости от экрана
            if (currentView === 'dashboard') {
                html += `
                    <section class="hero-banner">
                        <div class="hero-text">
                            <h1>Эффективный менеджер задач</h1>
                            <p>Создавайте папки, разбивайте их на секции и легко отслеживайте ваши дедлайны.</p>
                        </div>
                        <div class="hero-cta">
                            <button class="btn btn-primary" id="addFolderQuickBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> Новая папка
                            </button>
                        </div>
                    </section>
                `;
            }

            // Статистика (всегда видна на главном экране и общем списке)
            let totalTasks = 0, completedTasks = 0;
            state.forEach(f => f.sections.forEach(s => s.tasks.forEach(t => {
                totalTasks++;
                if (t.isCompleted) completedTasks++;
            })));
            let percent = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;

            html += `
                <section class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <span class="stat-card-title">Задач в пайплайне</span>
                            <div class="stat-icon-box total">📊</div>
                        </div>
                        <div class="stat-number">${totalTasks}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <span class="stat-card-title">Выполнено</span>
                            <div class="stat-icon-box done">✅</div>
                        </div>
                        <div class="stat-number">${completedTasks}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <span class="stat-card-title">Прогресс трека</span>
                            <div class="stat-icon-box percent">🔥</div>
                        </div>
                        <div class="stat-number">${percent}%</div>
                        <div class="progress-track"><div class="progress-fill" style="width: ${percent}%"></div></div>
                    </div>
                </section>
            `;

            // Панель инструментов
            let titleView = currentView === 'dashboard' ? 'Рабочее пространство' : (currentView === 'favorites' ? 'Высокий приоритет' : 'Архив выполненных задач');
            if (currentView === 'all') titleView = 'Все задачи списком';

            html += `
                <div class="workspace-title-row">
                    <h2>${titleView}</h2>
                    ${currentView === 'dashboard' ? `
                        <button class="btn btn-primary" onclick="openCreateFolderModal()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> Добавить папку
                        </button>
                    ` : ''}
                </div>
                <div class="filter-bar">
                    <div class="filter-group">
                        <select class="select-custom" id="filterPriority">
                            <option value="all" ${filterPriority === 'all' ? 'selected' : ''}>Все приоритеты</option>
                            <option value="high" ${filterPriority === 'high' ? 'selected' : ''}>Высокий</option>
                            <option value="medium" ${filterPriority === 'medium' ? 'selected' : ''}>Средний</option>
                            <option value="low" ${filterPriority === 'low' ? 'selected' : ''}>Низкий</option>
                        </select>
                        <select class="select-custom" id="filterStatus">
                            <option value="all" ${filterStatus === 'all' ? 'selected' : ''}>Все статусы</option>
                            <option value="active" ${filterStatus === 'active' ? 'selected' : ''}>В работе</option>
                            <option value="completed" ${filterStatus === 'completed' ? 'selected' : ''}>Выполненные</option>
                        </select>
                    </div>
                </div>
            `;

            // Основной рендеринг структуры данных
            html += `<div class="folders-stack">`;

            let hasVisibleContent = false;

            state.forEach(folder => {
                // Если мы не на дашборде, папки как сущность не скрываем, но фильтруем задачи внутри них
                let folderHtml = `
                    <div class="folder-box ${folder.isOpen ? 'is-open' : ''}" data-id="${folder.id}">
                        <div class="folder-trigger" onclick="toggleFolderCollapse('${folder.id}')">
                            <div class="folder-meta">
                                <svg class="chevron-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--primary);"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                                <span class="folder-name">${folder.name}</span>
                            </div>
                            <div class="controls-group" onclick="event.stopPropagation();">
                                <button class="icon-btn" title="Добавить секцию" onclick="openCreateSectionModal('${folder.id}')">＋</button>
                                <button class="icon-btn" title="Редактировать папку" onclick="openEditFolderModal('${folder.id}', '${folder.name}')">✏️</button>
                                <button class="icon-btn danger-hover" title="Удалить папку" onclick="deleteFolder('${folder.id}')">🗑️</button>
                            </div>
                        </div>
                        <div class="folder-dropzone">
                `;

                let folderHasTasks = false;

                if (folder.sections.length === 0) {
                    folderHtml += `<div class="empty-state">В папке нет секций. Создайте первую секцию для распределения задач.</div>`;
                }

                folder.sections.forEach(section => {
                    let sectionHtml = `
                        <div class="section-block">
                            <div class="section-bar">
                                <div class="section-identity">📂 ${section.name}</div>
                                <div class="controls-group">
                                    <button class="icon-btn" title="Добавить задачу" onclick="openCreateTaskModal('${folder.id}', '${section.id}')">＋ Task</button>
                                    <button class="icon-btn danger-hover" title="Удалить секцию" onclick="deleteSection('${folder.id}', '${section.id}')">🗑️</button>
                                </div>
                            </div>
                            <div class="tasks-bundle">
                    `;

                    let filteredTasks = section.tasks.filter(task => {
                        // Поиск
                        if (searchQuery && !task.title.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                        // Системный фильтр в боковом меню
                        if (currentView === 'favorites' && task.priority !== 'high') return false;
                        if (currentView === 'archive' && !task.isCompleted) return false;
                        // Инструментальные фильтры (селекты)
                        if (filterPriority !== 'all' && task.priority !== filterPriority) return false;
                        if (filterStatus === 'active' && task.isCompleted) return false;
                        if (filterStatus === 'completed' && !task.isCompleted) return false;

                        return true;
                    });

                    if (filteredTasks.length > 0) {
                        folderHasTasks = true;
                        hasVisibleContent = true;
                    }

                    filteredTasks.forEach(task => {
                        sectionHtml += `
                            <div class="task-row ${task.isCompleted ? 'is-completed' : ''}">
                                <div class="task-interactive" onclick="toggleTaskStatus('${folder.id}', '${section.id}', '${task.id}')">
                                    <div class="checkbox-container">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                    </div>
                                    <div class="task-details-wrapper">
                                        <div class="task-title-text">${task.title}</div>
                                        <div class="task-meta-info">
                                            <span class="badge-priority priority-${task.priority}">${task.priority}</span>
                                            ${task.date ? `<span class="task-date">📅 ${task.date}</span>` : ''}
                                        </div>
                                    </div>
                                </div>
                                <div class="controls-group">
                                    <button class="icon-btn" onclick="openEditTaskModal('${folder.id}', '${section.id}', '${task.id}')">✏️</button>
                                    <button class="icon-btn danger-hover" onclick="deleteTask('${folder.id}', '${section.id}', '${task.id}')">🗑️</button>
                                </div>
                            </div>
                        `;
                    });

                    if (filteredTasks.length === 0) {
                        sectionHtml += `<div class="empty-state" style="padding:16px;">Нет подходящих задач</div>`;
                    }

                    sectionHtml += `</div></div>`;
                    folderHtml += sectionHtml;
                });

                folderHtml += `</div></div>`;

                // Применяем фильтр отображения пустых папок на спец-экранах
                if (currentView === 'dashboard' || folderHasTasks) {
                    html += folderHtml;
                    hasVisibleContent = true;
                }
            });

            if (!hasVisibleContent) {
                html += `<div class="empty-state" style="padding:60px;">Задач или папок не найдено. Измените фильтры или добавьте новые элементы.</div>`;
            }

            html += `</div>`;
            container.innerHTML = html;

            initViewListeners();
        }

        // ==========================================================================
        // БИЗНЕС-ЛОГИКА (CRUD ОПЕРАЦИИ С СОСТОЯНИЕМ)
        // ==========================================================================
        function toggleFolderCollapse(id) {
            const folder = state.find(f => f.id === id);
            if (folder) {
                folder.isOpen = !folder.isOpen;
                saveState();
                renderContent();
            }
        }

        // Папки
        function openCreateFolderModal() {
            document.getElementById('folderModalTitle').innerText = 'Создать папку';
            document.getElementById('folderModalId').value = '';
            document.getElementById('folderNameInput').value = '';
            openModal('folderModal');
        }

        function openEditFolderModal(id, name) {
            document.getElementById('folderModalTitle').innerText = 'Редактировать папку';
            document.getElementById('folderModalId').value = id;
            document.getElementById('folderNameInput').value = name;
            openModal('folderModal');
        }

        function saveFolder() {
            const id = document.getElementById('folderModalId').value;
            const name = document.getElementById('folderNameInput').value.trim();

            if (!name) {
                showToast('Введите название папки', 'danger');
                return;
            }

            if (id) {
                // Редактирование
                const folder = state.find(f => f.id === id);
                if (folder) folder.name = name;
            } else {
                // Создание
                state.push({
                    id: 'f_' + Date.now(),
                    name: name,
                    isOpen: true,
                    sections: []
                });
            }
            saveState();
            closeModal('folderModal');
            renderContent();
            showToast('Папка успешно сохранена', 'success');
        }

        function deleteFolder(id) {
            triggerConfirm('Удалить папку?', 'Все вложенные секции и задачи будут безвозвратно удалены.', () => {
                state = state.filter(f => f.id !== id);
                saveState();
                renderContent();
                showToast('Папка удалена', 'info');
            });
        }

        // Секции
        function openCreateSectionModal(folderId) {
            document.getElementById('sectionModalTitle').innerText = 'Добавить категорию/секцию';
            document.getElementById('sectionFolderId').value = folderId;
            document.getElementById('sectionModalId').value = '';
            document.getElementById('sectionNameInput').value = '';
            openModal('sectionModal');
        }

        function saveSection() {
            const folderId = document.getElementById('sectionFolderId').value;
            const sectionId = document.getElementById('sectionModalId').value;
            const name = document.getElementById('sectionNameInput').value.trim();

            if (!name) {
                showToast('Введите название секции', 'danger');
                return;
            }

            const folder = state.find(f => f.id === folderId);
            if (!folder) return;

            if (sectionId) {
                const section = folder.sections.find(s => s.id === sectionId);
                if (section) section.name = name;
            } else {
                folder.sections.push({
                    id: 's_' + Date.now(),
                    name: name,
                    tasks: []
                });
            }
            saveState();
            closeModal('sectionModal');
            renderContent();
            showToast('Секция успешно сохранена', 'success');
        }

        function deleteSection(folderId, sectionId) {
            triggerConfirm('Удалить секцию?', 'Все задачи в этой секции будут стерты.', () => {
                const folder = state.find(f => f.id === folderId);
                if (folder) {
                    folder.sections = folder.sections.filter(s => s.id !== sectionId);
                    saveState();
                    renderContent();
                    showToast('Секция удалена', 'info');
                }
            });
        }

        // Задачи
        function openCreateTaskModal(folderId, sectionId) {
            document.getElementById('taskModalTitle').innerText = 'Создать задачу';
            document.getElementById('taskModalId').value = '';
            document.getElementById('taskFolderId').value = folderId;
            document.getElementById('taskSectionId').value = sectionId;
            document.getElementById('taskTitleInput').value = '';
            document.getElementById('taskPrioritySelect').value = 'medium';
            document.getElementById('taskDateInput').value = '';
            openModal('taskModal');
        }

        function openEditTaskModal(folderId, sectionId, taskId) {
            const folder = state.find(f => f.id === folderId);
            const section = folder?.sections.find(s => s.id === sectionId);
            const task = section?.tasks.find(t => t.id === taskId);

            if (!task) return;

            document.getElementById('taskModalTitle').innerText = 'Редактировать задачу';
            document.getElementById('taskModalId').value = task.id;
            document.getElementById('taskFolderId').value = folderId;
            document.getElementById('taskSectionId').value = sectionId;
            document.getElementById('taskTitleInput').value = task.title;
            document.getElementById('taskPrioritySelect').value = task.priority;
            document.getElementById('taskDateInput').value = task.date || '';
            openModal('taskModal');
        }

        function saveTask() {
            const taskId = document.getElementById('taskModalId').value;
            const folderId = document.getElementById('taskFolderId').value;
            const sectionId = document.getElementById('taskSectionId').value;
            
            const title = document.getElementById('taskTitleInput').value.trim();
            const priority = document.getElementById('taskPrioritySelect').value;
            const date = document.getElementById('taskDateInput').value;

            if (!title) {
                showToast('Введите текст задачи', 'danger');
                return;
            }

            const folder = state.find(f => f.id === folderId);
            const section = folder?.sections.find(s => s.id === sectionId);
            if (!section) return;

            if (taskId) {
                const task = section.tasks.find(t => t.id === taskId);
                if (task) {
                    task.title = title;
                    task.priority = priority;
                    task.date = date;
                }
            } else {
                section.tasks.push({
                    id: 't_' + Date.now(),
                    title: title,
                    priority: priority,
                    date: date,
                    isCompleted: false
                });
            }

            saveState();
            closeModal('taskModal');
            renderContent();
            showToast('Задача сохранена', 'success');
        }

        function toggleTaskStatus(folderId, sectionId, taskId) {
            const folder = state.find(f => f.id === folderId);
            const section = folder?.sections.find(s => s.id === sectionId);
            const task = section?.tasks.find(t => t.id === taskId);

            if (task) {
                task.isCompleted = !task.isCompleted;
                saveState();
                renderContent();
                showToast(task.isCompleted ? 'Задача выполнена!' : 'Задача возвращена в работу', 'info');
            }
        }

        function deleteTask(folderId, sectionId, taskId) {
            triggerConfirm('Удалить задачу?', 'Вы собираетесь удалить эту задачу из списка.', () => {
                const folder = state.find(f => f.id === folderId);
                const section = folder?.sections.find(s => s.id === sectionId);
                if (section) {
                    section.tasks = section.tasks.filter(t => t.id !== taskId);
                    saveState();
                    renderContent();
                    showToast('Задача удалена', 'info');
                }
            });
        }

        // ==========================================================================
        // ОБРАБОТЧИКИ СОБЫТИЙ И СЛУШАТЕЛИ
        // ==========================================================================
        function initGlobalListeners() {
            // Переключатели бокового меню
            document.querySelectorAll('.sidebar-nav .nav-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    document.querySelectorAll('.sidebar-nav .nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    currentView = item.getAttribute('data-view');
                    
                    // Закрытие мобильного меню при переходе
                    document.getElementById('appSidebar').classList.remove('is-mobile-open');
                    document.body.classList.remove('sidebar-active');

                    renderContent();
                });
            });

            // Живой глобальный поиск
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderContent();
            });

            // Смена темы
            document.getElementById('themeSwitchBtn').addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('taskflow_theme', newTheme);
                toggleThemeIcons(newTheme);
                showToast(`Включена ${newTheme === 'dark' ? 'темная' : 'светлая'} тема`, 'info');
            });

            // Мобильная адаптация кнопок открытия/закрытия меню
            document.getElementById('openSidebarBtn').addEventListener('click', () => {
                document.getElementById('appSidebar').classList.add('is-mobile-open');
                document.body.classList.add('sidebar-active');
            });

            const closeBtn = document.getElementById('closeSidebarBtn');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    document.getElementById('appSidebar').classList.remove('is-mobile-open');
                    document.body.classList.remove('sidebar-active');
                });
            }

            document.getElementById('sidebarBackdrop').addEventListener('click', () => {
                document.getElementById('appSidebar').classList.remove('is-mobile-open');
                document.body.classList.remove('sidebar-active');
            });

            // Привязка отправки форм в модальных окнах
            document.getElementById('saveFolderBtn').addEventListener('click', saveFolder);
            document.getElementById('saveSectionBtn').addEventListener('click', saveSection);
            document.getElementById('saveTaskBtn').addEventListener('click', saveTask);
            document.getElementById('confirmModalSubmitBtn').addEventListener('click', () => {
                if (confirmCallback) confirmCallback();
                closeModal('confirmModal');
            });
        }

        function initViewListeners() {
            // Динамические фильтры (если они отрисованы)
            const fPriority = document.getElementById('filterPriority');
            const fStatus = document.getElementById('filterStatus');

            if (fPriority) {
                fPriority.addEventListener('change', (e) => {
                    filterPriority = e.target.value;
                    renderContent();
                });
            }
            if (fStatus) {
                fStatus.addEventListener('change', (e) => {
                    filterStatus = e.target.value;
                    renderContent();
                });
            }

            // Быстрые кнопки на дашборде
            const quickFolderBtn = document.getElementById('addFolderQuickBtn');
            if (quickFolderBtn) {
                quickFolderBtn.addEventListener('click', openCreateFolderModal);
            }
        }

        function initSettingsListeners() {
            // Сохранение профиля
            document.getElementById('saveProfileBtn').addEventListener('click', () => {
                const name = document.getElementById('profileNameInput').value.trim();
                const role = document.getElementById('profileRoleInput').value.trim();

                if (!name || !role) {
                    showToast('Поля профиля не могут быть пустыми', 'danger');
                    return;
                }

                profile = { name, role };
                localStorage.setItem('taskflow_profile', JSON.stringify(profile));
                updateProfileUI();
                document.getElementById('settingsAvatar').innerText = name.charAt(0).toUpperCase();
                showToast('Профиль успешно обновлен', 'success');
            });

            // Экспорт JSON файлов
            document.getElementById('exportDataBtn').addEventListener('click', () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `taskflow_backup_${new Date().toISOString().split('T')[0]}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
                showToast('Файл резервной копии сгенерирован', 'success');
            });

            // Импорт из файла JSON
            document.getElementById('importFileHidden').onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (Array.isArray(importedData)) {
                            state = importedData;
                            saveState();
                            showToast('Резервная копия успешно восстановлена!', 'success');
                            document.querySelector('[data-view="dashboard"]').click();
                        } else {
                            showToast('Неверная структура JSON файла', 'danger');
                        }
                    } catch (err) {
                        showToast('Ошибка при чтении файла JSON', 'danger');
                    }
                };
                reader.readAsText(file);
            };
        }

        // Инициализация при старте
        window.addEventListener('DOMContentLoaded', () => {
            initTheme();
            updateBadges();
            updateProfileUI();
            initGlobalListeners();
            renderContent();
        });
    </script>
</body>
</html>
